isplay: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1.5rem; text-align: center; } /* Gear icon SVG */ .gear-wrap { margin-bottom: 2.5rem; animation: spin 12s linear infinite; opacity: 0.35; } @keyframes spin { to { transform: rotate(360deg); } } h1 { font-size: clamp(2.8rem, 10vw, 6rem); font-weight: 700; line-height: 1.0; letter-spacing: -0.03em; background: linear-gradient(135deg, #e0deff 0%, #a09bff 50%, #1ab896 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1rem; } .sub { font-size: clamp(1rem, 3vw, 1.25rem); font-weight: 300; color: var(--text-secondary); margin-bottom: 3rem; letter-spacing: 0.02em; } .divider { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); margin: 0 auto 2.5rem; } .contact-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; margin-bottom: 0.75rem; } .email-pill { display: inline-flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 11px 22px; font-size: 14.5px; font-family: 'Space Grotesk', sans-serif; color: var(--text-primary); text-decoration: none; transition: border-color 0.2s, background 0.2s, color 0.2s; } .email-pill:hover { border-color: rgba(108,99,255,0.45); background: rgba(108,99,255,0.07); color: #a09bff; } .email-pill svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; } footer { position: relative; z-index: 1; text-align: center; padding: 1.5rem; font-size: 11.5px; color: var(--text-muted); letter-spacing: 0.04em; } .fade-up { opacity: 0; transform: translateY(18px); animation: fadeUp 0.65s ease forwards; } @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } } .d1 { animation-delay: 0.1s; } .d2 { animation-delay: 0.25s; } .d3 { animation-delay: 0.4s; } .d4 { animation-delay: 0.55s; } .d5 { animation-delay: 0.7s; } @media (prefers-reduced-motion: reduce) { .fade-up, .gear-wrap { animation: none !important; opacity: 1; transform: none; } } </style> </head> <body> <div class="orb orb-1"></div> <div class="orb orb-2"></div> <main> <div class="gear-wrap fade-up d1"> <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg"> <path d="M30 20a10 10 0 100 20 10 10 0 000-20z" stroke="#a09bff" stroke-width="2.2" stroke-linecap="round"/> <path d="M30 4v6M30 50v6M4 30h6M50 30h6 M10.1 10.1l4.2 4.2M45.7 45.7l4.2 4.2 M49.9 10.1l-4.2 4.2M14.3 45.7l-4.2 4.2" stroke="#a09bff" stroke-width="2.4" stroke-linecap="round"/> </svg> </div> <h1 class="fade-up d2">Under Construction</h1> <p class="sub fade-up d3">We'll be back soon — something great is on the way.</p> <div class="divider fade-up d3"></div> <p class="contact-label fade-up d4">In the meantime, reach us at</p> <a href="mailto:info@sudeeppandit.com.np" class="email-pill fade-up d5"> <svg viewBox="0 0 24 24" aria-hidden="true"> <rect x="2" y="4" width="20" height="16" rx="2"/> <polyline points="2,4 12,13 22,4"/> </svg> info@sudeeppandit.com.np </a> </main> <footer>© 2026 · All rights reserved</footer> </body> </html>
